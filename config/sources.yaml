sources:
  arxiv:
    name: "ArXiv"
    base_url: "http://export.arxiv.org/api/query"
    enabled: true

    # Throughput target
    rate_limit: 1
    request_delay_seconds: 4
    request_delay_jitter_seconds: 1

    # Per-request page size
    max_results_per_query: 1000

    # Runtime limiter (needs pagination-aware collector)
    pagination:
      enabled: true
      start: 0
      page_size: 1000
      max_requests: 10000
      resume_from_checkpoint: true
      checkpoint_every_requests: 10
      checkpoint_file: "data/raw/arxiv/arxiv_checkpoint.json"

    categories:
    - astro-ph.*
    - cond-mat.*
    - cs.*
    - econ.*
    - eess.*
    - gr-qc
    - hep-ex
    - hep-lat
    - hep-ph
    - hep-th
    - math.*
    - math-ph
    - nlin.*
    - nucl-ex
    - nucl-th
    - physics.*
    - q-bio.*
    - q-fin.*
    - quant-ph
    - stat.*

  openalex:
    name: "OpenAlex"
    base_url: "https://api.openalex.org"
    enabled: true
    email: "ash007414@gmail.com"
    rate_limit: 10
    request_delay_seconds: 0.1
    max_results_per_query: 200

    pagination:
      enabled: true
      resume_from_checkpoint: true
      checkpoint_file: "data/raw/openalex/openalex_checkpoint.json"

    year_from: 1900
    year_to: 2026

    concepts:
    - id: "C41008148"
      name: "computer_science"
    - id: "C154945302"
      name: "artificial_intelligence"
    - id: "C119857082"
      name: "machine_learning"
    - id: "C121332964"
      name: "physics"
    - id: "C33923547"
      name: "mathematics"
    - id: "C86803240"
      name: "biology"
    - id: "C71924100"
      name: "medicine"
    - id: "C185592680"
      name: "chemistry"
    - id: "C127413603"
      name: "engineering"
    - id: "C144024400"
      name: "sociology"

  pubmed:
    name: "PubMed"
    base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi"
    enabled: true
    rate_limit: 3
    request_delay_seconds: 0.3
    request_delay_jitter_seconds: 0.2

    # Runtime limiter (needs pagination-aware collector)
    pagination:
      enabled: true
      start: 0
      page_size: 200
      max_requests: 1000
      resume_from_checkpoint: true
      checkpoint_every_requests: 10
      checkpoint_file: "data/raw/pubmed/pubmed_checkpoint.json"

  semanticscholar:
    name: "Semantic Scholar"
    base_url: "https://api.semanticscholar.org/graph/v1"
    enabled: false
    rate_limit: 1
    max_results_per_query: 100
